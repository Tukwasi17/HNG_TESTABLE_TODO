<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Item Card</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <article data-testid="test-todo-card" class="todo-card">
            <header>
                <h2 data-testid="test-todo-title" class="todo-title">Complete the Frontend Task</h2>
                <span data-testid="test-todo-priority" class="priority-badge" aria-label="Priority: Medium">Medium</span>
            </header>
            <p data-testid="test-todo-description" class="todo-description">Build a testable todo item card component with all required elements and accessibility features.</p>
            <div class="todo-meta">
                <time data-testid="test-todo-due-date" class="due-date" datetime="2026-04-20T12:00:00Z">Due Apr 20, 2026</time>
                <span data-testid="test-todo-time-remaining" class="time-remaining" aria-live="polite">Due in 5 days</span>
                <span data-testid="test-todo-status" class="status-indicator">Pending</span>
            </div>
            <div class="todo-actions">
                <label for="complete-toggle" class="checkbox-label">
                    <input type="checkbox" id="complete-toggle" data-testid="test-todo-complete-toggle">
                    Mark as Complete
                </label>
                <button data-testid="test-todo-edit-button" class="edit-button" aria-label="Edit todo">Edit</button>
                <button data-testid="test-todo-delete-button" class="delete-button" aria-label="Delete todo">Delete</button>
            </div>
            <ul data-testid="test-todo-tags" class="tags-list" role="list">
                <li data-testid="test-todo-tag-work" class="tag">Work</li>
                <li data-testid="test-todo-tag-urgent" class="tag">Urgent</li>
            </ul>
        </article>
    </main>
    <script src="script.js"></script>
</body>
</html>
